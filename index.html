/* ── base.css ────────────────────────────────────────────────────────────── */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--page-bg);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: var(--default-color);
}

.app-container {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
}

#game-row {
    display: flex;
    gap: 30px;
}

.board {
    display: grid;
    grid-template-columns: repeat(8, 70px);
    grid-template-rows: repeat(8, 70px);
    border-radius: 10px;
    border: 10px solid var(--board-border);
    overflow: hidden;
    box-shadow: 0 2px 5px var(--board-shadow);
}

#app[data-transform="rot90"]   .board { transform: rotate(90deg); }
#app[data-transform="rot90"]   .cell  { transform: rotate(-90deg); }
#app[data-transform="rot180"]  .board { transform: rotate(180deg); }
#app[data-transform="rot180"]  .cell  { transform: rotate(-180deg); }
#app[data-transform="rot270"]  .board { transform: rotate(270deg); }
#app[data-transform="rot270"]  .cell  { transform: rotate(-270deg); }
#app[data-transform="mirror-h"] .board { transform: scaleY(-1); }
#app[data-transform="mirror-h"] .cell  { transform: scaleY(-1); }
#app[data-transform="mirror-v"] .board { transform: scaleX(-1); }
#app[data-transform="mirror-v"] .cell  { transform: scaleX(-1); }
#app[data-transform="diag-main"] .board { transform: rotate(90deg) scaleY(-1); }
#app[data-transform="diag-main"] .cell  { transform: scaleY(-1) rotate(-90deg); }
#app[data-transform="diag-anti"] .board { transform: rotate(90deg) scaleX(-1); }
#app[data-transform="diag-anti"] .cell  { transform: scaleX(-1) rotate(-90deg); }

.cell {
    width: 70px;
    height: 70px;
    position: relative;
    isolation: isolate;
    cursor: pointer;
}

.board.no-click .cell       { cursor: default; }
.cell[data-occupied="true"] { cursor: default; }
#app.finished .cell         { cursor: auto; }

.cell.light { background-color: var(--cell-light); }
.cell.dark  { background-color: var(--cell-dark); }

.cell[data-marker]::after {
    content: "";
    position: absolute;
    z-index: 1;
    inset: 0;
    pointer-events: none;
}
.cell[data-marker="green"]::after  { background-color: var(--green-marked-cell); }
.cell[data-marker="red"]::after    { background-color: var(--red-marked-cell); }
.cell[data-marker="blue"]::after   { background-color: var(--blue-marked-cell); }
.cell[data-marker="threat"]::after { background-color: var(--threat-marked-cell); }

.cell.light[data-last-move] { background-color: var(--last-move-light); }
.cell.dark[data-last-move]  { background-color: var(--last-move-dark); }

.cell[data-win] .stone {
    box-shadow:
        0 0 12px var(--win-glow),
        inset -4px -6px 8px var(--stone-shadow-dark),
        inset 3px 4px 6px var(--stone-shadow-light);
}

.stone {
    width: 52px;
    height: 48px;
    border-radius: 50%;
    position: absolute;
    z-index: 2;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9) rotate(-10deg);
    box-shadow:
        inset -4px -6px 8px var(--stone-shadow-dark),
        inset 3px 4px 6px var(--stone-shadow-light);
    transition: opacity 0.15s ease, transform 0.1s ease;
    display: none;
}

.cell[data-state="black"] .stone,
.cell[data-state="white"] .stone,
.cell[data-preview] .stone,
.stone.stone-label { display: block; }

.cell[data-state="black"] .stone,
.cell[data-preview="black"] .stone,
.stone.stone-black {
    background: radial-gradient(circle at 30% 30%, var(--stone-black-light), var(--stone-black-dark));
}

.cell[data-state="white"] .stone,
.cell[data-preview="white"] .stone,
.stone.stone-white {
    background: radial-gradient(circle at 30% 30%, var(--stone-white-light), var(--stone-white-dark));
    border: 1px solid var(--stone-white-border);
}

.cell[data-preview] .stone {
    opacity: 0.35;
    filter: brightness(1.2);
    transform: translate(-50%, -50%) scale(0.95) rotate(-10deg);
    cursor: pointer;
}

.move-number {
    position: absolute;
    z-index: 3;
    font-size: 0.9em;
    font-weight: bold;
}

#app:not(.morpion-mode) .move-number {
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--move-number-on-black);
    text-shadow: 0 0 4px var(--move-number-shadow-dark);
    pointer-events: none;
}

#app:not(.morpion-mode) .cell[data-state="white"] .stone + .move-number {
    color: var(--move-number-on-white);
    text-shadow: 0 0 4px var(--move-number-shadow-light);
}

#app.morpion-mode .stone {
    background: none;
    border: none;
    box-shadow: none;
    border-radius: 0;
    transform: translate(-50%, -50%) scale(1) rotate(0deg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    font-weight: 800;
    font-family: Arial, sans-serif;
    color: var(--morpion-piece);
}

#app.morpion-mode .cell[data-state="black"] .stone::before,
#app.morpion-mode .cell[data-preview="black"] .stone::before,
#app.morpion-mode .stone-black::before { content: "X"; }

#app.morpion-mode .cell[data-state="white"] .stone::before,
#app.morpion-mode .cell[data-preview="white"] .stone::before,
#app.morpion-mode .stone-white::before { content: "O"; }

#app.morpion-mode .cell[data-win] .stone { color: var(--morpion-win); }

/* ── components.css ──────────────────────────────────────────────────────── */
.sidebar {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

#player-black { order: 1; }
#controls     { order: 2; }
#player-white { order: 3; }

.local-black #player-black { order: 3; }
.local-black #player-white { order: 1; }

.player {
    background: var(--panel-bg);
    padding: 15px;
    border-radius: 8px;
    width: 200px;
    box-shadow: 0 2px 5px var(--panel-shadow);
}

.stone-label {
    width: 26px;
    height: 24px;
    position: static;
    transform: scale(0.9) rotate(-10deg);
}

#app.morpion-mode .stone-label { transform: translate(-10%, -10%) scale(0.5); }

.player-name {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
    font-weight: bold;
}

.bot-label {
    color: var(--bot-label-text);
    background: var(--bot-label-bg);
    border: 1px solid var(--bot-label-border);
    border-radius: 6px;
    padding: 2px 6px;
    font-size: 0.75em;
    font-weight: 800;
    letter-spacing: 0.08em;
}

.clock {
    font-size: 24px;
    margin-top: 10px;
    transition: color 0.2s, transform 0.1s;
}

.active-clock .colon { animation: blink 2s infinite; }

@keyframes blink {
    0%   { opacity: 1; }
    50%  { opacity: 0; }
    100% { opacity: 1; }
}

#app.finished .colon, .clock:not(.active-clock) .colon { animation: none; }

.centi-seconds { font-size: 0.6em; margin-left: 2px; opacity: 0.8; }
.clock.low-time { color: var(--low-time); }
.player-active  { outline: 3px solid var(--player-active-outline); }

.controls {
    display: flex;
    flex-direction: column;
    align-items: center;
}

#new-game-btn {
    margin: 20px 0;
    padding: 15px;
    font-size: 18px;
    border-radius: 10px;
    border: 1px solid var(--button-border);
    background: var(--button-bg);
    cursor: pointer;
    box-shadow: 0 2px 5px var(--button-shadow);
    display: block;
    transition: all 0.2s ease;
}

#new-game-btn:hover { background: var(--button-bg-hover); transform: scale(1.05); }

/* ── view-menu dropdown ───────────────────────────────────────────────────── */
#view-menu {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 200;
}

#view-menu-btn {
    background: none;
    border: none;
    color: var(--default-color);
    cursor: pointer;
    font-size: 1.4em;
    line-height: 1;
    padding: 4px 8px;
    opacity: 0.55;
    transition: opacity 0.2s;
}
#view-menu-btn:hover { opacity: 1; }

.view-menu-panel {
    position: absolute;
    top: calc(100% + 2px);
    left: 0;
    background: var(--panel-bg);
    border: 1px solid var(--button-border);
    border-radius: 10px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 100;
    box-shadow: 0 4px 14px var(--panel-shadow);
    min-width: 190px;
}
.view-menu-panel.hidden { display: none; }

.view-menu-row {
    display: flex;
    gap: 6px;
}

.view-menu-panel > button,
.view-menu-row   > button {
    flex: 1;
    padding: 7px 10px;
    font-size: 0.85em;
    border-radius: 7px;
    border: 1px solid var(--button-border);
    background: var(--button-bg);
    color: var(--default-color);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
    white-space: nowrap;
}
.view-menu-panel > button:hover,
.view-menu-row   > button:hover { background: var(--button-bg-hover); }

.view-menu-panel button.vm-active {
    outline: 2px solid var(--player-active-outline);
    outline-offset: -2px;
}

.view-menu-panel kbd {
    font-size: 0.75em;
    opacity: 0.5;
    font-family: monospace;
}

/* ── board nav buttons ────────────────────────────────────────────────────── */
#nav-btns {
    /* 8×70px board content + 2×10px border = 580px total board width */
    width: 580px;
    display: flex;
    justify-content: center;
    gap: 4px;
}

#nav-btns button {
    background: none;
    border: none;
    color: var(--default-color);
    cursor: pointer;
    font-size: 1.3em;
    padding: 2px 12px;
    opacity: 0.4;
    transition: opacity 0.15s;
}

#nav-btns button:hover { opacity: 1; }

.timer-selector, .level-selector {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 10px 0;
    font-size: 1.2em;
}

#app:not(.finished):not(.editor-mode) .controls { display: none; }

#time-slider, #increment-slider, #level {
    width: 150px;
    cursor: pointer;
    accent-color: var(--slider-accent);
}

.editor-mode .board { border: 10px dashed var(--editor-board-border); }
.editor-mode .cell  {
    cursor: crosshair;
    outline: 4px dashed var(--editor-cell-outline);
    outline-offset: -2px;
}

<body>
    <div id="app" class="app-container morpion-mode">

        <!-- loader.js: apply saved preferences before first paint -->
        <script>
        (function () {
            var morpion = localStorage.getItem("morpionMode");
            if (morpion === "false") document.getElementById("app").classList.remove("morpion-mode");
            var theme = localStorage.getItem("theme");
            if (theme) document.body.setAttribute("data-theme", theme);
        })();
        </script>

        <div id="game-row">
            <div id="board" class="board"></div>

            <div class="sidebar">

                <div id="player-black" class="player player-active">
                    <div id="player-name-black" class="player-name">
                        <span class="stone stone-label stone-black"></span>
                        <span class="player-name-text">Black</span>
                    </div>
                    <div id="clock-black" class="clock">
                        <span class="minutes"></span>
                        <span class="colon">:</span>
                        <span class="seconds"></span>
                        <span class="centi-seconds"></span>
                    </div>
                </div>

                <div id="controls" class="controls">
                    <button id="new-game-btn">NEW GAME</button>
                    <div class="timer-selector">
                        <label><span id="time-label"></span></label>
                        <input type="range" id="time-slider" min="0" step="1">
                    </div>
                    <div class="timer-selector">
                        <label>+<span id="increment-label"></span></label>
                        <input type="range" id="increment-slider" min="0" step="1">
                    </div>
                    <div class="level-selector">
                        <label id="level-label" for="level">Hard</label>
                        <input type="range" id="level" min="1" max="4" value="3" step="1">
                    </div>
                </div>

                <div id="player-white" class="player">

    // ── constants.js ──────────────────────────────────────────────────────────
    const BOARD_SIZE = 8;
    const TIME_PRESETS = [3, 15, 30, 60, 120, 180, 300, 600, 900, 1800, 3600];
    const INCREMENT_PRESETS = [0, 1, 2, 3, 5, 10, 15, 30, 60];
    const THEMES = ["light", "dark", "blue", "green"];
    const LEVEL_LABELS = ["Random", "Easy", "Medium", "Hard", "Expert"];
    const BOARD_TRANSFORMS = ["identity", "rot90", "rot180", "rot270", "mirror-h", "diag-anti", "mirror-v", "diag-main"];

    // ── bot.js ────────────────────────────────────────────────────────────────
    const MASK64 = 0xFFFFFFFFFFFFFFFFn;

    const BT = [
        1190112520884487201n,
        2380225041768974402n,
        4760450083537948804n,
        9520900167075897608n,
         595056260442243600n,
    ];

    const WMA = [
        31n,62n,124n,248n,
        7936n,15872n,31744n,63488n,
        2031616n,4063232n,8126464n,16252928n,
        520093696n,1040187392n,2080374784n,4160749568n,
        133143986176n,266287972352n,532575944704n,1065151889408n,
        34084860461056n,68169720922112n,136339441844224n,272678883688448n,
        8725724278030336n,17451448556060672n,34902897112121344n,69805794224242688n,
        2233785415175766016n,4467570830351532032n,8935141660703064064n,17870283321406128128n,
        4311810305n,1103823438080n,282578800148480n,72340172838010880n,
        8623620610n,2207646876160n,565157600296960n,144680345676021760n,
        17247241220n,4415293752320n,1130315200593920n,289360691352043520n,
        34494482440n,8830587504640n,2260630401187840n,578721382704087040n,
        68988964880n,17661175009280n,4521260802375680n,1157442765408174080n,
        137977929760n,35322350018560n,9042521604751360n,2314885530816348160n,
        275955859520n,70644700037120n,18085043209502720n,4629771061632696320n,
        551911719040n,141289400074240n,36170086419005440n,9259542123265392640n,
        68853957121n,137707914242n,275415828484n,550831656968n,
        17626613022976n,35253226045952n,70506452091904n,141012904183808n,
        4512412933881856n,9024825867763712n,18049651735527424n,36099303471054848n,
        1155177711073755136n,2310355422147510272n,4620710844295020544n,9241421688590041088n,
        4328785936n,8657571872n,17315143744n,34630287488n,
        1108169199616n,2216338399232n,4432676798464n,8865353596928n,
        283691315101696n,567382630203392n,1134765260406784n,2269530520813568n,
        72624976666034176n,145249953332068352n,290499906664136704n,580999813328273408n,
    ];

    const MOVES = Array.from({length: 64}, (_, k) => 1n << BigInt(k));

    function getWinningTilesBB(bb) {
        let res = 0n;
        for (let i = 0; i < 96; i++) {
            const m = WMA[i];
            if ((bb & m) === m) res |= m;
        }
        return res;
    }

    function wmBB(bbCurrent, bbOpen) {
        let res = 0n;
        for (let k = 0; k < 5; k++) {
            const move = BT[k] & bbOpen;
            const wt   = getWinningTilesBB(bbCurrent | move);
            if (wt !== 0n) res |= (wt & move);
        }
        return res;
    }

    function hasMultipleBits(bb) {
        return bb !== 0n && (bb & (bb - 1n)) !== 0n;
    }

    function dtBB(bbCurrent, bbOpen) {
        let res = 0n;
        for (let k = 0; k < 64; k++) {
            const move = MOVES[k];
            if ((move & bbOpen) !== 0n)
                if (hasMultipleBits(wmBB(bbCurrent | move, bbOpen ^ move)))
                    res |= move;
        }
        return res;
    }

    function cmBB(bbCurrent, bbOpen) {
        let res = 0n;
        const bbOpponent = (MASK64 ^ bbOpen) ^ bbCurrent;
        for (let k = 0; k < 64; k++) {
            const move = MOVES[k];
            if ((move & bbOpen) !== 0n) {
                const bbAfter     = bbCurrent | move;
                const bbRemaining = bbOpen    ^ move;
                if (wmBB(bbAfter, bbRemaining) !== 0n) {
                    res |= move;
                } else if (dtBB(bbOpponent, bbRemaining) === 0n) {
                    res |= move;
                }
            }
        }
        return res;
    }

    function makeRandomU64() {
        const hi = BigInt(Math.floor(Math.random() * 0x100000000));
        const lo = BigInt(Math.floor(Math.random() * 0x100000000));
        return (hi << 32n) | lo;
    }

    function mcBB(bbCurrent, bbOpen, n) {
        const scores = new Array(64).fill(0);
        for (let t = 0; t < n; t++) {
            const wt = getWinningTilesBB(bbCurrent | (makeRandomU64() & bbOpen)) & bbOpen;
            for (let k = 0; k < 64; k++)
                if ((wt & MOVES[k]) !== 0n) scores[k]++;
        }
        let bestK = -1, bestScore = -1;
        for (let k = 0; k < 64; k++)
            if ((MOVES[k] & bbOpen) !== 0n && scores[k] > bestScore)
                { bestScore = scores[k]; bestK = k; }
        return bestK;
    }

    function bb2m(bb) {
        const out = [];
        for (let k = 0; k < 64; k++)
            if ((bb & MOVES[k]) !== 0n) out.push(k);
        return out;
    }

    function pick(bb) {
        const ms = bb2m(bb);
        return ms[Math.floor(Math.random() * ms.length)];
    }

    function randomOpen(bbOpen) {
        const ms = bb2m(bbOpen);
        return ms[Math.floor(Math.random() * ms.length)];
    }

    function boardToBB(board, playerValue) {
        let bb = 0n;
        for (let r = 0; r < 8; r++)
            for (let c = 0; c < 8; c++)
                if (board[r][c] === playerValue) bb |= MOVES[r * 8 + c];
        return bb;
    }

    function bbToTiles(bb) {
        const out = [];
        for (let k = 0; k < 64; k++)
            if ((bb & MOVES[k]) !== 0n) out.push([k >> 3, k & 7]);
        return out;
    }

    function isWinning(bb) {
        for (let i = 0; i < 96; i++) {
            const m = WMA[i];
            if ((bb & m) === m) return true;
        }
        return false;
    }

    function isDeadDraw(bbCurrent, bbOpponent) {
        return !isWinning(MASK64 ^ bbOpponent) && !isWinning(MASK64 ^ bbCurrent);
    }

    function computeWin(board, player) {
        return bbToTiles(getWinningTilesBB(boardToBB(board, player + 1)));
    }

    function isBoardFull(board) {
        for (let r = 0; r < 8; r++)
            for (let c = 0; c < 8; c++)
                if (board[r][c] === 0) return false;
        return true;
    }

    function computeTactics(board, currentPlayer) {
        const bbCur  = boardToBB(board, currentPlayer + 1);
        const bbOpp  = boardToBB(board, 2 - currentPlayer);
        const bbOpen = MASK64 ^ (bbCur | bbOpp);

        // 1. Immediate win
        let forced = wmBB(bbCur, bbOpen);
        if (forced === 0n) {
            // 2. Opponent winning threat (must block)
            forced = wmBB(bbOpp, bbOpen);
        }
        if (forced === 0n) {
            // 3. Current player's double threats
            forced = dtBB(bbCur, bbOpen);
        }
        if (forced === 0n) {
            // 4. Opponent double threats → try counter, else show opponent's threats
            const ot = dtBB(bbOpp, bbOpen);
            if (ot !== 0n) {
                const cm = cmBB(bbCur, bbOpen);
                forced = cm !== 0n ? cm : ot;
            }
        }

        const result = Array.from({length: 8}, () => Array(8).fill(0));
        for (let k = 0; k < 64; k++)
            if ((forced & MOVES[k]) !== 0n) result[k >> 3][k & 7] = 1;
        return result;
    }

    function computeBotMove(board, currentPlayer, level) {
        const bbCur  = boardToBB(board, currentPlayer + 1);
        const bbOpp  = boardToBB(board, 2 - currentPlayer);
        const bbOpen = MASK64 ^ (bbCur | bbOpp);

        if (level === 0) { const k = randomOpen(bbOpen); return [k >> 3, k & 7]; }

        const MC_BY_LEVEL = [1, 10, 100, 10_000];
        const mcN = MC_BY_LEVEL[level] ?? 1;

        const wm = wmBB(bbCur, bbOpen);
        if (wm !== 0n) { const k = pick(wm); return [k >> 3, k & 7]; }

        if (level >= 1) {
            const owm = wmBB(bbOpp, bbOpen);
            if (owm !== 0n) { const k = pick(owm); return [k >> 3, k & 7]; }
        }

        if (level >= 2) {
            const dt = dtBB(bbCur, bbOpen);
            if (dt !== 0n) { const k = pick(dt); return [k >> 3, k & 7]; }
        }

        if (level >= 3) {
            const odt = dtBB(bbOpp, bbOpen);
            if (odt !== 0n) {
                const cm = cmBB(bbCur, bbOpen);
                const k  = pick(cm !== 0n ? cm : odt);
                return [k >> 3, k & 7];
            }
        }

        const k = mcBB(bbCur, bbOpen, mcN);
        if (k === -1) { const idx = randomOpen(bbOpen); return [idx >> 3, idx & 7]; }
        return [k >> 3, k & 7];
    }

            currentPlayer: editorPlayer,
            lastMove:      ml.length > 0 ? ml[ml.length - 1] : null,
            moveList:      ml,
            winningTiles,
            finished,
            winner,
            times:         [parseFloat(time) || 1, parseFloat(time) || 1],
            increments:    [parseFloat(increment) || 1, parseFloat(increment) || 1],
            clockPly:      ml.length,
            level:         parseInt(level) || 3,
            players: [
                { nickname: lp === 0 ? 'Player' : 'Bot', isBot: lp !== 0 },
                { nickname: lp === 1 ? 'Player' : 'Bot', isBot: lp !== 1 },
            ],
        };
        return newGameResponse();
    }

    function handleTactics(body) {
        const { board, currentPlayer } = body;
        return computeTactics(board, currentPlayer);
    }

    async function api(path, options = {}) {
        const [pathname, qs] = path.split('?');
        const p    = new URLSearchParams(qs);
        const body = options.body ? JSON.parse(options.body) : null;
        switch (pathname) {
            case '/new_game':     return handleNewGame(p);
            case '/state':        return handleState();
            case '/move':         return handleMove(p);
            case '/botMove':      return handleBotMove();
            case '/flag':         return handleFlag();
            case '/submit_board': return handleSubmitBoard(body);
            case '/tactics':      return handleTactics(body);
            default: throw new Error(`Unknown local API route: ${path}`);
        }
    }

    // ── render.js ─────────────────────────────────────────────────────────────
    const cells = [];

    function createBoard() {
        dom.board.innerHTML = "";
        for (let row = 0; row < BOARD_SIZE; row++) {
            for (let col = 0; col < BOARD_SIZE; col++) {
                const cell = document.createElement("div");
                cell.classList.add("cell");
                cell.classList.add((row + col) % 2 === 0 ? "light" : "dark");
                cell.dataset.row   = row;
                cell.dataset.col   = col;
                cell.dataset.index = row * BOARD_SIZE + col;
                const stone = document.createElement("div");
                stone.classList.add("stone");
                cell.appendChild(stone);
                dom.board.appendChild(cell);
                cells.push(cell);
            }
        }
    }

    function getCell(row, col) { return cells[row * BOARD_SIZE + col]; }

    function render() {
        renderAppState();
        renderOrientation();
        renderBoard();
        renderCursor();
        renderMoveNumbers();
        renderPlayers();
        renderNicknames();
        renderClocks();
    }

    function renderAppState() {
        dom.app.classList.toggle("finished",    state.finished);
        dom.app.classList.toggle("editor-mode", state.editorMode);
        dom.app.classList.toggle("local-black", state.localPlayerIndex === 0);
        updateViewMenu();
    }

    function updateViewMenu() {
        dom.viewMenu.morpion.classList.toggle("vm-active", dom.app.classList.contains("morpion-mode"));
        dom.viewMenu.editor.classList.toggle("vm-active",  state.editorMode);
    }

    function renderBoard() {
        for (let row = 0; row < BOARD_SIZE; row++)
            for (let col = 0; col < BOARD_SIZE; col++)
                renderCell(row, col);
    }

    function renderOrientation() {
        dom.app.dataset.transform = BOARD_TRANSFORMS[state.transformIndex];
    }

    function renderCell(row, col) {
        const cell   = getCell(row, col);
        const marker = state.markers[`${row},${col}`];
        const boardData = currentBoard();
        const value  = boardData[row][col];

        let effectiveLastMove    = null;
        let effectiveWinningTiles = [];

        if (!state.editorMode) {
            if (state.replayMode) {
                if (state.replayPly > 0) effectiveLastMove = state.moveList[state.replayPly - 1];
                if (state.replayPly === state.moveList.length) effectiveWinningTiles = state.winningTiles;
            } else {
                effectiveLastMove     = state.lastMove;
                effectiveWinningTiles = state.winningTiles;
            }
        }

        cell.dataset.state    = value === 1 ? "black" : value === 2 ? "white" : "empty";
        cell.dataset.occupied = value !== 0;

        if (marker) cell.dataset.marker = marker;
        else        delete cell.dataset.marker;

        if (state.tacticalData?.[row][col]) cell.dataset.marker = "threat";

        if (effectiveLastMove && effectiveLastMove[0] === row && effectiveLastMove[1] === col)
            cell.dataset.lastMove = "true";
        else
            delete cell.dataset.lastMove;

        if (effectiveWinningTiles.some(([i, j]) => i === row && j === col))
            cell.dataset.win = "true";
        else
            delete cell.dataset.win;
    }

    function renderCursor() {
        const canClick =
            !state.finished &&
            !state.replayMode &&
            state.players &&
            !state.players[state.currentPlayer].isBot &&
            state.localPlayerIndex === state.currentPlayer;
        dom.board.classList.toggle("no-click", !canClick);
    }

    function renderMoveNumbers() {
        document.querySelectorAll(".move-number").forEach(el => el.remove());
        if (!state.finished || !state.moveList || state.editorMode) return;

        const visibleMoves = state.replayMode
            ? state.moveList.slice(0, state.replayPly)
            : state.moveList;

        visibleMoves.forEach(([i, j], idx) => {
            const label = document.createElement("div");
            label.className   = "move-number";
            label.textContent = idx + 1;
            dom.board.children[i * BOARD_SIZE + j].appendChild(label);
        });
    }

    function renderPlayers() {
        const activePlayer = currentActivePlayer();
        dom.players.black.app.classList.toggle("player-active", activePlayer === 0);
        dom.players.white.app.classList.toggle("player-active", activePlayer === 1);
    }

    function renderNicknames() {
        const black = state.players[0];
        const white = state.players[1];
        document.title = `Game ${black.nickname} - ${white.nickname}`;
        renderPlayerName(dom.players.black.name, black);
        renderPlayerName(dom.players.white.name, white);
    }

    function renderPlayerName(playerDom, playerData) {
        const nameSpan = playerDom.querySelector(".player-name-text");
        nameSpan.textContent = playerData.nickname;
        const existing = playerDom.querySelector(".bot-label");
        if (existing) existing.remove();
        if (playerData.isBot) {
            const botLabel = document.createElement("span");
            botLabel.classList.add("bot-label");
            botLabel.textContent = "BOT";
            playerDom.appendChild(botLabel);
        }
    }

    function renderClocks() {
        updateClockDisplay(dom.players.black.clock, state.remainingTimes[0]);
        updateClockDisplay(dom.players.white.clock, state.remainingTimes[1]);
        dom.players.black.clock.classList.toggle("low-time",    state.remainingTimes[0] < 10);
        dom.players.white.clock.classList.toggle("low-time",    state.remainingTimes[1] < 10);
        dom.players.black.clock.classList.toggle("active-clock", state.currentPlayer === 0);
        dom.players.white.clock.classList.toggle("active-clock", state.currentPlayer === 1);
    }

    function renderReplay() {
        renderBoard();
        renderPlayers();
        renderMoveNumbers();
        renderCursor();
    }

    function updateClockDisplay(clockEl, time) {
        const safeTime = Math.max(0, time);
        const m  = Math.floor(safeTime / 60);
        const s  = Math.floor(safeTime % 60);
        const cs = Math.floor((safeTime * 100) % 100);
        clockEl.querySelector(".minutes").textContent      = m.toString().padStart(2, "0");
        clockEl.querySelector(".seconds").textContent      = s.toString().padStart(2, "0");
        clockEl.querySelector(".centi-seconds").textContent =
            safeTime >= 20 ? "" : cs.toString().padStart(2, "0");
    }

    // ── clock.js ──────────────────────────────────────────────────────────────
    let onFlagged      = null;
    let flagInProgress = false;

    function configureClock({ onFlagged: callback }) { onFlagged = callback; }

    function startClock() {
        if (state.clockPly < 2 || state.finished) return;
        stopClock();
        state.clockInterval = setInterval(tickClock, 73);
    }

    function stopClock() {
        if (state.clockInterval) { clearInterval(state.clockInterval); state.clockInterval = null; }
    }

    function syncClockState() {
        if (state.finished) stopClock();
        else                startClock();
    }

    async function tickClock() {
        if (state.finished) { stopClock(); return; }
        const now = Date.now();
        const dt  = (now - state.lastUpdate) / 1000;
        state.lastUpdate = now;
        state.remainingTimes[state.currentPlayer] -= dt;
        if (state.remainingTimes[state.currentPlayer] <= 0) {
            state.remainingTimes[state.currentPlayer] = 0;
            await flagCurrentPlayer();
        }
        renderClocks();
    }

    async function flagCurrentPlayer() {
        if (flagInProgress || state.finished) return;
        flagInProgress = true;
        await api(`/flag?gid=${state.gameId}`, { method: 'POST' });
        if (onFlagged) await onFlagged();
        flagInProgress = false;
    }

    // ── effects.js ────────────────────────────────────────────────────────────
    function handleGameEnd() {
        stopClock();
        const isMorpionMode = dom.app.classList.contains("morpion-mode");
        setTimeout(() => {
            alert(
                state.winner === 0 ? (isMorpionMode ? "X wins!"  : "Black wins!") :
                state.winner === 1 ? (isMorpionMode ? "O wins!"  : "White wins!") :
                "Draw."
            );
        }, 50);
    }

    // ── preferences.js ────────────────────────────────────────────────────────
    function loadSystemPreferences() {
        const isMorpionMode = localStorage.getItem("morpionMode");
        if (isMorpionMode === "false") dom.app.classList.remove("morpion-mode");
        const theme = localStorage.getItem("theme") || "light";
        setTheme(theme);
    }

    function setTheme(theme) {
        document.body.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
    }

    function cycleTheme(backward) {
        const current     = document.body.getAttribute("data-theme") || "light";
        const current_idx = THEMES.indexOf(current);
        const nextTheme   = THEMES[(current_idx + (backward ? THEMES.length - 1 : 1)) % THEMES.length];
        setTheme(nextTheme);
    }

    function toggleMorpionMode() {
        const enabled = dom.app.classList.toggle("morpion-mode");
        localStorage.setItem("morpionMode", enabled);
    }

    function initSliders() {
        dom.controls.timeSlider.max      = TIME_PRESETS.length - 1;
        dom.controls.incrementSlider.max = INCREMENT_PRESETS.length - 1;
        dom.controls.levelSlider.max     = LEVEL_LABELS.length - 1;

        dom.controls.timeSlider.value      = localStorage.getItem("time")      || 1;
        dom.controls.incrementSlider.value = localStorage.getItem("increment") || 1;
        dom.controls.levelSlider.value     = localStorage.getItem("level")     || 3;

        dom.controls.timeSlider.addEventListener("input",      updateTimeLabel);
        dom.controls.incrementSlider.addEventListener("input", updateIncrementLabel);
        dom.controls.levelSlider.addEventListener("input",     updateLevelLabel);

        updateTimeLabel();
        updateIncrementLabel();
        updateLevelLabel();
    }

    function selectedSliders() {
        return {
            time:      TIME_PRESETS[dom.controls.timeSlider.value],
            increment: INCREMENT_PRESETS[dom.controls.incrementSlider.value],
            level:     dom.controls.levelSlider.value,
        };
    }

    function updateTimeLabel() {
        localStorage.setItem("time", dom.controls.timeSlider.value);
        dom.controls.timeLabel.textContent = formatTime(TIME_PRESETS[dom.controls.timeSlider.value]);
    }

    function updateIncrementLabel() {
        localStorage.setItem("increment", dom.controls.incrementSlider.value);
        dom.controls.incrementLabel.textContent = formatTime(INCREMENT_PRESETS[dom.controls.incrementSlider.value]);
    }

    function updateLevelLabel() {
        localStorage.setItem("level", dom.controls.levelSlider.value);
        dom.controls.levelLabel.textContent = LEVEL_LABELS[dom.controls.levelSlider.value];
    }

    function formatTime(seconds) {
        if (seconds < 60)   return `${seconds}s`;
        if (seconds < 3600) return `${Math.floor(seconds / 60)}m`;
        return `${Math.floor(seconds / 3600)}h`;
    }

    // ── actions.js ────────────────────────────────────────────────────────────
    async function newGame() {
        if (state.editorMode) { await submitEditorBoard(); return; }
        exitReplayMode();
        stopClock();
        const { time, increment, level } = selectedSliders();
        const data = await api(`/new_game?level=${level}&time=${time}&increment=${increment}`, { method: 'POST' });
        await launchNewGame(data);
    }

    async function launchNewGame(data) {
        state.gameId         = data.gid;
        state.initialBoard   = JSON.stringify(data.board);
        state.initialPlayer  = data.currentPlayer;
        state.players        = data.players;
        state.level          = data.level ?? 3;
        state.localPlayerIndex = state.players[0].isBot ? 1 : 0;
        state.timesNeedSync  = true;
        await updateFromServer();
        await maybeTriggerBotMove();
    }

    async function updateFromServer() {
        const wasFinished = state.finished;
        const data = await api(`/state?gid=${state.gameId}`);
        applyServerState(data);
        resetTacticalData();
        syncClockState();
        render();
        refreshHoverPreview();
        if (!wasFinished && state.finished) handleGameEnd();
    }

    async function maybeTriggerBotMove() {
        if (state.botMoveInProgress || state.finished || !state.players ||
            !state.players[state.currentPlayer].isBot) return;
        state.botMoveInProgress = true;

        const botIndex = state.currentPlayer;
        await new Promise(r => setTimeout(r, 0)); // yield for repaint / hover-clear

        // Time budget: for WASM Expert bot use up to 90 % of remaining time
        // capped at 3 s; for JS bot 500 ms is plenty.
        const remaining = state.remainingTimes[botIndex];
        const timeBudgetMs = state.level >= 4
            ? (remaining > 0 ? Math.min(3000, remaining * 900) : 3000)
            : 500;

        const [i, j] = await new Promise(resolve => {
            botWorker.onmessage = e => resolve(e.data.move);
            botWorker.postMessage({
                board:         state.board,
                currentPlayer: state.currentPlayer,
                level:         state.level,
                timeBudgetMs,
            });
        });

        // If the bot was flagged while thinking, discard the move (game already ended).
        if (!state.finished) {
            // Clock has been running and deducting time; add the increment now.
            state.remainingTimes[botIndex] += state.increments[botIndex];
            await api(`/move?gid=${state.gameId}&i=${i}&j=${j}`, { method: 'POST' });
            await updateFromServer();
        }
        state.botMoveInProgress = false;
    }

    async function playCell(cell) {
        const i = Number(cell.dataset.row);
        const j = Number(cell.dataset.col);
        resetTacticalData();
        if (state.editorMode) { playEditorCell(i, j); return; }
        if (state.replayMode && !state.finished) { exitReplayMode(); render(); return; }
        if (!canPlayCell(i, j)) return;

        const previousLastMove = state.lastMove ? [...state.lastMove] : null;
        applyOptimisticMove(i, j);
        startClock();
        if (previousLastMove) renderCell(previousLastMove[0], previousLastMove[1]);
        renderCell(i, j);
        renderCursor();
        renderPlayers();
        renderClocks();

        await api(`/move?gid=${state.gameId}&i=${i}&j=${j}`, { method: 'POST' });
        if (state.replayMode) { exitReplayMode(); render(); }
        await updateFromServer();
        await maybeTriggerBotMove();
    }

    function resetTacticalData() {
        if (state.tacticalData) { state.tacticalData = null; renderBoard(); }
    }

    function applyOptimisticMove(i, j) {
        state.board[i][j] = state.currentPlayer + 1;
        state.lastMove    = [i, j];
        state.moveList.push([i, j]);
        state.remainingTimes[state.currentPlayer] += state.increments[state.currentPlayer];
        state.currentPlayer = 1 - state.currentPlayer;
        state.clockPly     += 1;
        state.lastUpdate    = Date.now();
        clearAllPreviews();
    }

    function canPlayCell(i, j) {
        return (
            state.board &&
            state.localPlayerIndex === state.currentPlayer &&
            state.board[i][j] === 0 &&
            !state.finished &&
            !state.editorMode &&
            !state.replayMode
        );
    }

    function showPreview(cell) {
        const i = Number(cell.dataset.row);
        const j = Number(cell.dataset.col);
        if (!canPlayCell(i, j)) return;
        cell.dataset.preview = state.currentPlayer === 0 ? "black" : "white";
    }

    function hidePreview(cell) { delete cell.dataset.preview; }

    function clearAllPreviews() {
        for (const cell of document.getElementsByClassName('cell'))
            if (cell.dataset.preview) delete cell.dataset.preview;
    }

    function refreshHoverPreview() {
        if (!state.hoveredCell) return;
        hidePreview(state.hoveredCell);
        showPreview(state.hoveredCell);
    }

    function toggleMarker(cell, color) {
        const i   = Number(cell.dataset.row);
        const j   = Number(cell.dataset.col);
        const key = `${i},${j}`;
        if (state.markers[key] === color) delete state.markers[key];
        else                              state.markers[key] = color;
        renderCell(i, j);
    }

    function clearAllMarkers() { state.markers = {}; renderBoard(); }

    function toggleMirrorHorizontal(vertical) {
        if (vertical) {
            if (state.transformIndex < 4) state.transformIndex = (state.transformIndex + 2) % 4;
            else                          state.transformIndex = 4 + (state.transformIndex - 2) % 4;
        }
        state.transformIndex = (state.transformIndex + 4) % 8;
        renderOrientation();
    }

    function cycleRotation(backwards) {
        if (state.transformIndex < 4)
            state.transformIndex = (state.transformIndex + (backwards ? 3 : 1)) % 4;
        else
            state.transformIndex = 4 + (state.transformIndex - (backwards ? 3 : 1)) % 4;
        renderOrientation();
    }

    function enterReplayMode() {
        state.replayMode  = true;
        state.replayPly   = state.moveList.length;
        state.replayBoard = buildReplayBoard(state.replayPly);
        render();
        refreshHoverPreview();
    }

    function exitReplayMode() {
        state.replayMode  = false;
        state.replayPly   = null;
        state.replayBoard = null;
        refreshHoverPreview();
        renderCursor();
    }

    function buildReplayBoard(ply) {
        const board  = JSON.parse(state.initialBoard);
        let player   = state.initialPlayer;
        for (let k = 0; k < ply; k++) {
            const [i, j] = state.moveList[k];
            board[i][j]  = player + 1;
            player       = 1 - player;
        }
        return board;
    }

    function replayPrevious() {
        if (!state.replayMode) enterReplayMode();
        if (state.replayPly <= 0) return;
        state.replayPly--;
        state.replayBoard = buildReplayBoard(state.replayPly);
        resetTacticalData();
        renderReplay();
    }

    function replayNext() {
        if (!state.replayMode) return;
        if (state.replayPly >= state.moveList.length) return;
        state.replayPly++;
        state.replayBoard = buildReplayBoard(state.replayPly);
        resetTacticalData();
        renderReplay();
        if (state.replayPly >= state.moveList.length) exitReplayMode();
    }

    function replayStart() {
        state.replayMode  = true;
        state.replayPly   = 0;
        state.replayBoard = buildReplayBoard(0);
        resetTacticalData();
        renderReplay();
        refreshHoverPreview();
    }

    function replayEnd() {
        state.replayMode  = true;
        state.replayPly   = state.moveList.length;
        state.replayBoard = buildReplayBoard(state.replayPly);
        resetTacticalData();
        renderReplay();
        exitReplayMode();
    }

    async function restartFromReplay() {
        if (!state.replayMode) return;
        stopClock();
        const originalInitialBoard  = JSON.stringify(state.initialBoard);
        const originalInitialPlayer = state.initialPlayer;
        const { time, increment, level } = selectedSliders();
        const data = await api(`/submit_board`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                board: state.replayBoard, editorPlayer: replayCurrentPlayer(),
                moveList: replayMoveList(), localPlayer: state.localPlayerIndex,
                time, increment, level,
            }),
        });
        exitReplayMode();
        await launchNewGame(data);
        state.initialBoard  = JSON.parse(originalInitialBoard);
        state.initialPlayer = originalInitialPlayer;
    }

    async function togglePlayers() {
        if (state.replayMode) return;
        stopClock();
        const originalInitialBoard  = JSON.stringify(state.initialBoard);
        const originalInitialPlayer = state.initialPlayer;
        const { time, increment, level } = selectedSliders();
        const data = await api(`/submit_board`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                board: currentBoard(), editorPlayer: currentActivePlayer(),
                moveList: replayMoveList(), localPlayer: 1 - state.localPlayerIndex,
                time, increment, level,
            }),
        });
        exitReplayMode();
        await launchNewGame(data);
        state.initialBoard  = JSON.parse(originalInitialBoard);
        state.initialPlayer = originalInitialPlayer;
    }

    async function analyzeTactics() {
        if (state.tacticalData) { resetTacticalData(); return; }
        const data = await api(`/tactics`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ board: currentBoard(), currentPlayer: state.currentPlayer }),
        });
        state.tacticalData = data;
        renderBoard();
    }

    function toggleEditorMode() {
        state.editorMode = !state.editorMode;
        resetTacticalData();
        clearAllPreviews();
        if (state.editorMode) {
            state.editorBoard  = state.replayMode ? structuredClone(state.replayBoard) : structuredClone(state.board);
            state.editorPlayer = state.currentPlayer;
        } else {
            state.editorBoard  = null;
            state.editorPlayer = null;
        }
        render();
    }

    function toggleEditorPlayer() {
        if (!state.editorMode) return;
        state.editorPlayer = 1 - state.editorPlayer;
        renderPlayers();
    }

    function clearEditorBoard() {
        if (!state.editorMode) return;
        state.editorBoard = Array.from({length: BOARD_SIZE}, () => Array(BOARD_SIZE).fill(0));
        renderBoard();
    }

    function swapEditorColors() {
        if (!state.editorMode) return;
        for (let i = 0; i < BOARD_SIZE; i++)
            for (let j = 0; j < BOARD_SIZE; j++)
                if      (state.editorBoard[i][j] === 1) state.editorBoard[i][j] = 2;
                else if (state.editorBoard[i][j] === 2) state.editorBoard[i][j] = 1;
        renderBoard();
    }

    function playEditorCell(i, j) {
        const current = state.editorBoard[i][j];
        const next    = state.editorPlayer + 1;
        state.editorBoard[i][j] = current === next ? 0 : next;
        renderBoard();
    }

    async function submitEditorBoard() {
        if (!state.editorMode) return;
        exitReplayMode();
        stopClock();
        const { time, increment, level } = selectedSliders();
        const data = await api(`/submit_board`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                board: state.editorBoard, editorPlayer: state.editorPlayer,
                moveList: null, localPlayer: state.localPlayerIndex,
                time, increment, level,
            }),
        });
        state.editorMode  = false;
        state.editorBoard  = null;
        state.editorPlayer = null;
        await launchNewGame(data);
    }

    function resetToDefaultView() {
        if (state.editorMode) toggleEditorMode();
        exitReplayMode();
        clearAllPreviews();
        clearAllMarkers();
        state.transformIndex = 0;
        render();
    }

    // ── events.js ─────────────────────────────────────────────────────────────
    function initEvents() {
        document.addEventListener("keydown", async (e) => {
            const tag = document.activeElement.tagName.toLowerCase();
            if (tag === "input" || tag === "textarea") return;
            switch (e.key.toLowerCase()) {
                case "m":        toggleMorpionMode(); break;
                case "e":        toggleEditorMode(); break;
                case "f":        toggleMirrorHorizontal(e.shiftKey); break;
                case "r":        cycleRotation(e.shiftKey); break;
                case "d":        cycleTheme(e.shiftKey); break;
                case "c":        clearEditorBoard(); break;
                case "s":        swapEditorColors(); break;
                case "t":        await analyzeTactics(); break;
                case " ":
                    e.preventDefault();
                    if (state.editorMode) toggleEditorPlayer();
                    else if (!state.botMoveInProgress) await togglePlayers();
                    break;
                case "escape":   resetToDefaultView(); break;
                case "enter":
                    if (state.editorMode)       await submitEditorBoard();
                    else if (state.replayMode)  await restartFromReplay();
                    else if (state.finished)    await newGame();
                    break;
                case "arrowleft":  replayPrevious(); break;
                case "arrowright": replayNext(); break;
                case "home":       replayStart(); break;
                case "end":        replayEnd(); break;
            }
        });

        // ── view-menu dropdown ────────────────────────────────────────────────
        dom.viewMenu.btn.addEventListener("click", (e) => {
            e.stopPropagation();
            dom.viewMenu.panel.classList.toggle("hidden");
        });
        document.addEventListener("click", () => dom.viewMenu.panel.classList.add("hidden"));
        dom.viewMenu.toggleBot.addEventListener("click", async () => { if (!state.botMoveInProgress) await togglePlayers(); });
        dom.viewMenu.morpion.addEventListener("click",  () => { toggleMorpionMode(); updateViewMenu(); });
        dom.viewMenu.editor.addEventListener("click",   () => { toggleEditorMode();  updateViewMenu(); });
        dom.viewMenu.flipH.addEventListener("click",    () => toggleMirrorHorizontal(false));
        dom.viewMenu.flipV.addEventListener("click",    () => toggleMirrorHorizontal(true));
        dom.viewMenu.rotateCW.addEventListener("click",  () => cycleRotation(false));
        dom.viewMenu.rotateCCW.addEventListener("click", () => cycleRotation(true));
        dom.viewMenu.themePrev.addEventListener("click", () => cycleTheme(true));
        dom.viewMenu.themeNext.addEventListener("click", () => cycleTheme(false));

        dom.navBtns.begin.addEventListener("click", () => replayStart());
        dom.navBtns.prev.addEventListener("click",  () => replayPrevious());
        dom.navBtns.next.addEventListener("click",  () => replayNext());
        dom.navBtns.end.addEventListener("click",   () => replayEnd());

        dom.board.addEventListener("click", async (e) => {
            const cell = e.target.closest(".cell");
            if (cell) await playCell(cell);
        });

        dom.board.addEventListener("mousedown", (e) => {
            if (e.button !== 1) return;
            e.preventDefault();
            clearAllMarkers();
        });

        dom.board.addEventListener("mouseover", (e) => {
            const cell = e.target.closest(".cell");
            if (!cell) return;
            state.hoveredCell = cell;
            showPreview(cell);
        });

        dom.board.addEventListener("mouseout", (e) => {
            const cell = e.target.closest(".cell");
            if (!cell) return;
            state.hoveredCell = null;
            hidePreview(cell);
        });

        dom.board.addEventListener("wheel", (e) => {
            e.preventDefault();
            if (e.deltaY > 0) replayNext();
            else              replayPrevious();
        }, { passive: false });

        dom.board.addEventListener("contextmenu", (e) => {
            e.preventDefault();
            const cell = e.target.closest(".cell");
            if (!cell) return;
            if (e.ctrlKey)       toggleMarker(cell, "blue");
            else if (e.shiftKey) toggleMarker(cell, "red");
            else                 toggleMarker(cell, "green");
        });

        dom.controls.newGameBtn.addEventListener("click", newGame);
    }

    // ── main.js ───────────────────────────────────────────────────────────────
    function init() {
        loadSystemPreferences();
        initSliders();
        createBoard();
        initEvents();
        configureClock({ onFlagged: updateFromServer });
        newGame();
    }

    document.addEventListener("DOMContentLoaded", init);

    </script>
</body>
</html>
