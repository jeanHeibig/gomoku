<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>8x8 Gomoku</h1>
<div id="players">
    <div id="p1">Joueur 1: -</div>
    <div id="p2">Joueur 2: -</div>
</div>
<div id="turn"></div>
<div id="message"></div>
<div id="board"></div>
<div>
    Joueur 1 : <span id="t1">60</span>s |
    Joueur 2 : <span id="t2">60</span>s
</div>

<script src="/static/app.js"></script>

<div>
    Temps (s):
    <input id="time_control" type="number" value="60" min="1" style="width:60px">

    Incrément (s):
    <input id="increment" type="number" value="0" min="0" style="width:60px">

    <button onclick="resetGame()">Nouvelle partie</button>
</div>
</body>
</html>
