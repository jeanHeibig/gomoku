<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Game</title>
        <link rel="stylesheet" href="/static/style.css">
    </head>

    <body>
        <div id="app" class="container morpion-mode">

            <div id="board" class="board"></div>

            <div class="sidebar">
                <!-- black -->
                <div id="player-black" class="player active">
                    <div id="player-name-black" class="player-name">
                        <span class="stone label black"></span>
                        <span class="name"></span>
                        <span class="bot-label hidden">BOT</span>
                    </div>
                    <div id="clock-black" class="clock">
                        <span class="minutes"></span>
                        <span class="colon">:</span>
                        <span class="seconds"></span>
                        <span class="centi-seconds"></span>
                    </div>
                </div>

                <button id="new-game-btn" onclick="newGame()">
                    NEW GAME
                </button>
                <div class="level-selector">
                    <label id="level-value" for="level">5</label>
                    <input type="range" id="level" min="0" max="5" value="5" step="1">
                </div>

                <!-- white -->
                <div id="player-white" class="player">
                    <div id="player-name-white" class="player-name">
                        <span class="stone label white"></span>
                        <span class="name"></span>
                        <span class="bot-label hidden">BOT</span>
                    </div>
                    <div id="clock-white" class="clock">
                        <span class="minutes"></span>
                        <span class="colon">:</span>
                        <span class="seconds"></span>
                        <span class="centi-seconds"></span>
                    </div>
                </div>

            </div>

        </div>

        <script src="/static/app.js"></script>

    </body>
</html>
