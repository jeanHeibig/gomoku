<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Game</title>
        <link rel="stylesheet" href="/static/styles/base.css">
        <link rel="stylesheet" href="/static/styles/components.css">
        <link rel="stylesheet" href="/static/styles/themes.css">
    </head>

    <body>
        <div id="app" class="app-container morpion-mode">

            <script src="/static/js/loader.js"></script>

            <div id="board" class="board"></div>

            <div class="sidebar">
                <!-- black -->
                <div id="player-black" class="player player-active">
                    <div id="player-name-black" class="player-name">
                        <span class="stone stone-label stone-black"></span>
                        <span class="player-name-text">Black</span>
                    </div>
                    <div id="clock-black" class="clock">
                        <span class="minutes"></span>
                        <span class="colon">:</span>
                        <span class="seconds"></span>
                        <span class="centi-seconds"></span>
                    </div>
                </div>

                <!-- controls -->
                <div id="controls" class="controls">
                    <button id="new-game-btn">
                        NEW GAME
                    </button>
                    <div class="timer-selector">
                        <label><span id="time-label"></span></label>
                        <input type="range" id="time-slider" min="0" step="1">
                    </div>
                    <div class="timer-selector">
                        <label>+<span id="increment-label"></span></label>
                        <input type="range" id="increment-slider" min="0" step="1">
                    </div>
                    <div class="level-selector">
                        <label id="level-label" for="level">3</label>
                        <input type="range" id="level" min="0" max="6" value="3" step="1">
                    </div>
                </div>

                <!-- white -->
                <div id="player-white" class="player">
                    <div id="player-name-white" class="player-name">
                        <span class="stone stone-label stone-white"></span>
                        <span class="player-name-text">White</span>
                    </div>
                    <div id="clock-white" class="clock">
                        <span class="minutes"></span>
                        <span class="colon">:</span>
                        <span class="seconds"></span>
                        <span class="centi-seconds"></span>
                    </div>
                </div>

            </div>

        </div>

        <script type="module" src="/static/js/main.js"></script>

    </body>
</html>
