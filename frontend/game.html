<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Gomoku Game Alice vs. Bob</title>

        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: #eee;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .container {
                display: flex;
                gap: 30px;
            }

            .board {
                display: grid;
                grid-template-columns: repeat(8, 70px);
                grid-template-rows: repeat(8, 70px);
                border: 4px solid #b58863;
            }

            .cell {
                width: 70px;
                height: 70px;
                position: relative;
            }

            .cell.light {
                background-color: #f0d9b5;
            }

            .cell.dark {
                background-color: #b58863;
            }

            .stone {
                width: 50px;
                height: 50px;
                border-radius: 50%;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            .black {
                background: radial-gradient(circle at 30% 30%, #555, #000);
            }

            .white {
                background: radial-gradient(circle at 30% 30%, #fff, #ccc);
                border: 1px solid #999;
            }

            /* players + clock */
            .sidebar {
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }

            .player {
                background: white;
                padding: 15px;
                border-radius: 8px;
                width: 200px;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            }

            .player-name {
                font-size: 18px;
                font-weight: bold;
            }

            .clock {
                font-size: 24px;
                margin-top: 10px;
            }

            .active {
                border: 3px solid #4caf50;
            }
        </style>
    </head>

    <body>
        <div class="container">

            <div id="board" class="board"></div>

            <div class="sidebar">
                <!-- black -->
                <div class="player active">
                    <div class="player-name">Alice (Black)</div>
                    <div class="clock">05:00</div>
                </div>

                <!-- white -->
                <div class="player">
                    <div class="player-name">Bob (White)</div>
                    <div class="clock">05:00</div>
                </div>

            </div>

        </div>

        <script>
            const board = document.getElementById("board");

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const cell = document.createElement("div");

                    cell.classList.add("cell");

                    if ((row + col) % 2 === 0) {
                        cell.classList.add("light");
                    } else {
                        cell.classList.add("dark");
                    }

                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    cell.dataset.indow = row * 8 + col;

                    board.appendChild(cell);
                }
            }
        </script>
    </body>
</html>
