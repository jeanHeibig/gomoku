<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Gomoku Game Alice vs. Bob</title>
        <link rel="stylesheet" href="/static/style.css">
    </head>

    <body>
        <div class="container">

            <div id="board" class="board"></div>

            <div class="sidebar">
                <!-- black -->
                <div id="player-black" class="player active">
                    <div id="player-name-black" class="player-name"></div>
                    <div id="clock-black" class="clock"></div>
                </div>

                <button id="new-game-btn" onclick="newGame()">
                    NEW GAME
                </button>

                <!-- white -->
                <div id="player-white" class="player">
                    <div id="player-name-white" class="player-name"></div>
                    <div id="clock-white" class="clock"></div>
                </div>

            </div>

        </div>

        <script src="/static/app.js"></script>

    </body>
</html>
